<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NMSC · Combat Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090e;--surface:#0b0e14;--border:#161d2a;--text:#e0d4bc;--muted:#3d4a5c;--accent:#c8a96e;
  --a1:#4fa8e0;--a1-dim:#4fa8e018;--a1-glow:#4fa8e040;
  --a2:#e07b4f;--a2-dim:#e07b4f18;--a2-glow:#e07b4f40;
  --g1:#4ade80;--g1-dim:#4ade8018;--g1-glow:#4ade8040;
  --g2:#a78bfa;--g2-dim:#a78bfa18;--g2-glow:#a78bfa40;
  --pre:#f5c842;--pre-dim:#f5c84218;--late:#3d4a5c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;height:100dvh;overflow:hidden;user-select:none;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 0%,#0d1a2e22 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 90% 100%,#1a0d2e18 0%,transparent 60%);pointer-events:none;z-index:0;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:white;opacity:0;animation:twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op,.4)}}
.topbar{position:relative;z-index:20;height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0;}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.site-title{font-family:'Cinzel',serif;font-size:0.7rem;font-weight:900;letter-spacing:0.18em;color:var(--accent);white-space:nowrap;flex-shrink:0;}
.vbar{width:1px;height:16px;background:var(--border);flex-shrink:0;}
.group-toggle{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;flex-shrink:0;}
.group-btn{font-family:'Cinzel',serif;font-size:0.58rem;font-weight:700;letter-spacing:0.1em;padding:5px 12px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:all .18s;white-space:nowrap;}
.group-btn+.group-btn{border-left:1px solid var(--border);}
.group-btn.a1.active{background:var(--a1-dim);color:var(--a1);}
.group-btn.a2.active{background:var(--a2-dim);color:var(--a2);}
.group-btn.g1.active{background:var(--g1-dim);color:var(--g1);}
.group-btn.g2.active{background:var(--g2-dim);color:var(--g2);}
.group-btn:not(.active):hover{color:var(--accent);}
.role-label{font-family:'Cinzel',serif;font-size:0.46rem;letter-spacing:0.18em;padding:3px 8px;border-radius:2px;border:1px solid var(--border);white-space:nowrap;flex-shrink:0;transition:all .18s;}
.mode-toggle{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;flex-shrink:0;}
.mode-btn{font-family:'Cinzel',serif;font-size:0.55rem;font-weight:600;letter-spacing:0.06em;padding:5px 10px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;}
.mode-btn+.mode-btn{border-left:1px solid var(--border);}
.mode-btn.active{background:#c8a96e10;color:var(--accent);}
.mode-btn:not(.active):hover{color:var(--text);}
.stagebar{position:relative;z-index:19;height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
.stagebar.hidden-bar{display:none;}
.stage-nav-btn{font-family:'Cinzel',serif;font-size:0.6rem;font-weight:600;letter-spacing:0.07em;padding:5px 14px;border-radius:3px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;flex-shrink:0;}
.stage-nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.stage-nav-btn:disabled{opacity:0.2;cursor:not-allowed;}
.stage-center{display:flex;align-items:center;gap:10px;flex:1;justify-content:center;}
.stage-center-num{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;color:var(--accent);line-height:1;}
.stage-center-label{font-family:'Cinzel',serif;font-size:0.44rem;letter-spacing:0.3em;color:var(--muted);}
.stage-dots{display:flex;gap:8px;align-items:center;}
.stage-dot{width:6px;height:6px;border-radius:50%;border:1px solid var(--muted);cursor:pointer;transition:all .15s;background:transparent;}
.stage-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 5px var(--accent);}
.stage-dot.done{background:#c8a96e28;border-color:#c8a96e44;}
.main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.hidden{display:none !important;}
.stage-carousel{flex:1;min-height:0;display:flex;flex-direction:row;overflow-x:scroll;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.stage-carousel::-webkit-scrollbar{display:none;}
.stage-page{flex:0 0 100%;width:100%;scroll-snap-align:start;scroll-snap-stop:always;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);overflow-y:auto;overflow-x:hidden;min-height:0;}
@media(min-width:601px){
  .stage-carousel{overflow-x:hidden;scroll-snap-type:none;}
  .stage-page{display:none;overflow-y:hidden;}
  .stage-page.active{display:grid;flex:1;width:100%;}
}
.move-col{background:var(--surface);display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:0 0 12px;min-height:0;}
@media(max-width:600px){.move-col{overflow-y:visible;flex-shrink:0;border-bottom:1px solid var(--border);}.move-col:last-child{border-bottom:none;}}
.move-col-header{position:sticky;top:0;background:var(--surface);width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 0 6px;border-bottom:1px solid var(--border);z-index:2;flex-shrink:0;}
.move-col-num{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;color:var(--accent);line-height:1;}
.move-col-sub{font-family:'Cinzel',serif;font-size:0.42rem;letter-spacing:0.2em;color:var(--muted);}
.wave-seq{display:flex;flex-direction:column;align-items:center;padding:10px 8px 0;width:100%;gap:0;}
.wave-entry{display:flex;flex-direction:column;align-items:center;width:100%;}
.wave-connector{width:1px;height:10px;background:linear-gradient(to bottom,var(--border),transparent);}
.wave-card{width:100%;border-radius:5px;border:1px solid var(--border);background:#ffffff04;overflow:hidden;}
.wave-card-header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:0.4rem;letter-spacing:0.18em;}
.wave-num-label{color:var(--muted);}
.wave-status-badge{font-size:0.38rem;letter-spacing:0.12em;padding:1px 5px;border-radius:20px;border:1px solid;}
.wave-status-badge.pre{color:var(--pre);border-color:var(--pre);background:var(--pre-dim);}
.wave-card-body{display:flex;align-items:center;justify-content:center;padding:8px 6px;gap:4px;}
.wave-loc{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;padding:6px 4px;border-radius:4px;border:1px solid var(--border);background:#ffffff03;}
.wave-loc-main{font-family:'Cinzel',serif;font-size:0.65rem;font-weight:700;letter-spacing:0.04em;line-height:1;}
.wave-loc-sub{font-family:'Cinzel',serif;font-size:0.38rem;letter-spacing:0.14em;color:var(--muted);}
.wave-card.pre-card{border-color:var(--pre);background:#f5c84208;}
.simple-col{background:var(--surface);display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:0 0 12px;min-height:0;}
@media(max-width:600px){.simple-col{overflow-y:visible;flex-shrink:0;border-bottom:1px solid var(--border);}.simple-col:last-child{border-bottom:none;}}
.simple-col-header{position:sticky;top:0;background:var(--surface);width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 0 6px;border-bottom:1px solid var(--border);z-index:2;flex-shrink:0;}
.simple-col-num{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;color:var(--accent);line-height:1;}
.simple-col-sub{font-family:'Cinzel',serif;font-size:0.42rem;letter-spacing:0.2em;color:var(--muted);}
.simple-wave-list{display:flex;flex-direction:column;align-items:center;padding:10px 8px 0;width:100%;gap:5px;}
.simple-wave-row{width:100%;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:4px;border:1px solid var(--border);background:#ffffff03;}
.simple-wave-row.absent{opacity:0.25;}
.simple-wave-label{font-family:'Cinzel',serif;font-size:0.4rem;letter-spacing:0.14em;color:var(--muted);flex-shrink:0;min-width:22px;}
.simple-wave-loc{font-family:'Cinzel',serif;font-size:0.58rem;font-weight:700;letter-spacing:0.04em;flex:1;}
.simple-wave-status{font-size:0.46rem;flex-shrink:0;}
.simple-wave-status.pre{color:var(--pre);}
.simple-wave-status.late{color:var(--late);}
.overview-view{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 12px 24px;}
.ov-stage-block{margin-bottom:16px;}
.ov-stage-title{font-family:'Cinzel',serif;font-size:0.52rem;font-weight:900;letter-spacing:0.28em;color:var(--accent);padding:0 0 8px;text-align:center;}
.ov-moves-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.ov-move-card{border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.ov-move-title{font-family:'Cinzel',serif;font-size:0.4rem;font-weight:600;letter-spacing:0.18em;color:var(--muted);padding:4px 6px;text-align:center;border-bottom:1px solid var(--border);background:#ffffff03;}
.ov-group-rows{display:flex;flex-direction:column;}
.ov-group-row{display:flex;align-items:flex-start;gap:5px;padding:4px 6px;border-bottom:1px solid var(--border);}
.ov-group-row:last-child{border-bottom:none;}
.ov-group-tag{font-family:'Cinzel',serif;font-size:0.38rem;font-weight:700;letter-spacing:0.08em;flex-shrink:0;min-width:18px;padding-top:1px;}
.ov-group-locs{font-family:'Cinzel',serif;font-size:0.38rem;letter-spacing:0.03em;color:var(--text);flex:1;line-height:1.4;}
.ov-divider{height:1px;background:var(--border);margin:10px 0;}
.bottom-bar{position:relative;z-index:10;height:30px;display:flex;align-items:center;justify-content:center;border-top:1px solid var(--border);flex-shrink:0;}
.kb-hint{font-size:0.48rem;color:#1e2a38;letter-spacing:0.07em;font-style:italic;}
@media(max-width:600px){.bottom-bar{display:none;}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="topbar">
  <div class="topbar-left">
    <div class="site-title">☽ NMSC · GUIDE ☀</div>
    <div class="vbar"></div>
    <div class="group-toggle" id="groupToggle">
      <button class="group-btn a1 active" onclick="selectGroup('a1')">A1</button>
      <button class="group-btn a2"        onclick="selectGroup('a2')">A2</button>
      <button class="group-btn g1"        onclick="selectGroup('g1')">G1</button>
      <button class="group-btn g2"        onclick="selectGroup('g2')">G2</button>
    </div>
    <div class="role-label" id="roleLabel">🏹 ARCHER</div>
  </div>
  <div class="topbar-right">
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('detail')">DETAIL</button>
      <button class="mode-btn"        onclick="setMode('simple')">SIMPLE</button>
      <button class="mode-btn"        onclick="setMode('overview')">OVERVIEW</button>
    </div>
  </div>
</div>
<div class="stagebar" id="stagebar">
  <button class="stage-nav-btn" id="stagePrev" onclick="changeStage(-1)">← STAGE</button>
  <div class="stage-center">
    <div class="stage-center-label">STAGE</div>
    <div class="stage-center-num" id="stageNum">1</div>
    <div class="stage-dots" id="stageDots"></div>
  </div>
  <button class="stage-nav-btn" id="stageNext" onclick="changeStage(1)">STAGE →</button>
</div>
<div class="main">
  <div class="stage-carousel" id="detailCarousel"></div>
  <div class="stage-carousel hidden" id="simpleCarousel"></div>
  <div class="overview-view  hidden" id="overviewView"></div>
</div>
<div class="bottom-bar">
  <div class="kb-hint">1 2 3 4 · jump stage &nbsp;|&nbsp; ← → · stage &nbsp;|&nbsp; A · a1 &nbsp; S · a2 &nbsp; Z · g1 &nbsp; X · g2</div>
</div>
<script>
const LOC_NAMES={rp:'RP',village:'VLG',beach:'BCH'};
function loc(name,spawn){return{name,spawn,abbr:LOC_NAMES[name]+'-'+spawn};}
const GROUP_META={
  a1:{label:'A1',role:'🏹 ARCHER',color:'var(--a1)'},
  a2:{label:'A2',role:'🏹 ARCHER',color:'var(--a2)'},
  g1:{label:'G1',role:'⚔️ GROUND',color:'var(--g1)'},
  g2:{label:'G2',role:'⚔️ GROUND',color:'var(--g2)'},
};
const stages=[
  // STAGE 1
  [
    {waves:['RP-M','VLG-R','RP-M'],groups:{
      a1:[{loc:loc('rp','M'),status:'here'},{loc:loc('village','R'),status:'here'},{loc:loc('rp','M'),status:'here'}],
      a2:[{loc:loc('rp','M'),status:'here'},{loc:loc('village','R'),status:'here'},{loc:loc('rp','M'),status:'here'}],
      g1:[{loc:loc('rp','M'),status:'here'},{loc:loc('village','R'),status:'here'},{loc:loc('rp','M'),status:'late'}],
      g2:[{loc:loc('rp','M'),status:'here'},{loc:loc('rp','M'),status:'pre'},{loc:loc('rp','M'),status:'here'}],
    }},
    {waves:['VLG-M','BCH-R','RP-M'],groups:{
      a1:[{loc:loc('village','M'),status:'here'},{loc:loc('rp','M'),status:'pre'},{loc:loc('rp','M'),status:'here'}],
      a2:[{loc:loc('beach','R'),status:'pre'},{loc:loc('beach','R'),status:'here'},{loc:loc('rp','M'),status:'late'}],
      g1:[{loc:loc('beach','R'),status:'pre'},{loc:loc('beach','R'),status:'here'},{loc:loc('rp','M'),status:'late'}],
      g2:[{loc:loc('village','M'),status:'here'},{loc:loc('rp','M'),status:'pre'},{loc:loc('rp','M'),status:'here'}],
    }},
    {waves:['RP-L','VLG-L','RP-R'],groups:{
      a1:[{loc:loc('rp','L'),status:'here'},{loc:loc('village','L'),status:'here'},{loc:loc('rp','R'),status:'here'}],
      a2:[{loc:loc('rp','L'),status:'here'},{loc:loc('rp','R'),status:'pre'},{loc:loc('rp','R'),status:'here'}],
      g1:[{loc:loc('rp','L'),status:'here'},{loc:loc('village','L'),status:'here'},{loc:loc('rp','R'),status:'late'}],
      g2:[{loc:loc('rp','L'),status:'here'},{loc:loc('rp','R'),status:'pre'},{loc:loc('rp','R'),status:'here'}],
    }},
  ],
  // STAGE 2
  [
    {waves:['BCH-M','VLG-R','RP-L'],groups:{
      a1:[{loc:loc('village','R'),status:'pre'},{loc:loc('village','R'),status:'here'},{loc:loc('rp','L'),status:'here'}],
      a2:[{loc:loc('beach','M'),status:'here'},{loc:loc('village','R'),status:'late'},{loc:loc('rp','L'),status:'here'}],
      g1:[{loc:loc('village','R'),status:'pre'},{loc:loc('village','R'),status:'here'},{loc:loc('rp','L'),status:'here'}],
      g2:[{loc:loc('beach','M'),status:'here'},{loc:loc('village','R'),status:'late'},{loc:loc('rp','L'),status:'here'}],
    }},
    {waves:['BCH-M','RP-R','BCH-R'],groups:{
      a1:[{loc:loc('beach','M'),status:'here'},{loc:loc('beach','R'),status:'pre'},{loc:loc('beach','R'),status:'here'}],
      a2:[{loc:loc('rp','R'),status:'pre'},{loc:loc('rp','R'),status:'here'},{loc:loc('beach','R'),status:'late'}],
      g1:[{loc:loc('beach','M'),status:'here'},{loc:loc('beach','R'),status:'pre'},{loc:loc('beach','R'),status:'here'}],
      g2:[{loc:loc('rp','R'),status:'pre'},{loc:loc('rp','R'),status:'here'},{loc:loc('beach','R'),status:'late'}],
    }},
    {waves:['VLG-R','RP-M','BCH-M'],groups:{
      a1:[{loc:loc('village','R'),status:'here'},{loc:loc('rp','M'),status:'here'},{loc:loc('beach','M'),status:'late'}],
      a2:[{loc:loc('village','R'),status:'here'},{loc:loc('beach','M'),status:'pre'},{loc:loc('beach','M'),status:'here'}],
      g1:[{loc:loc('village','R'),status:'here'},{loc:loc('rp','M'),status:'here'},{loc:loc('beach','M'),status:'late'}],
      g2:[{loc:loc('village','R'),status:'here'},{loc:loc('beach','M'),status:'pre'},{loc:loc('beach','M'),status:'here'}],
    }},
  ],
  // STAGE 3
  [
    {waves:['BCH-M','VLG-R','RP-M'],groups:{
      a1:[{loc:loc('village','R'),status:'pre'},{loc:loc('village','R'),status:'here'},{loc:loc('rp','M'),status:'here'}],
      a2:[{loc:loc('beach','M'),status:'here'},{loc:loc('village','R'),status:'late'},{loc:loc('rp','M'),status:'late'}],
      g1:[{loc:loc('village','R'),status:'pre'},{loc:loc('village','R'),status:'here'},{loc:loc('rp','M'),status:'here'}],
      g2:[{loc:loc('beach','M'),status:'here'},{loc:loc('village','R'),status:'late'},{loc:loc('rp','M'),status:'late'}],
    }},
    {waves:['BCH-M','RP-M','BCH-R'],groups:{
      a1:[{loc:loc('beach','M'),status:'here'},{loc:loc('beach','R'),status:'pre'},{loc:loc('beach','R'),status:'here'}],
      a2:[{loc:loc('rp','M'),status:'pre'},{loc:loc('rp','M'),status:'here'},{loc:loc('beach','R'),status:'late'}],
      g1:[{loc:loc('beach','M'),status:'here'},{loc:loc('beach','R'),status:'pre'},{loc:loc('beach','R'),status:'here'}],
      g2:[{loc:loc('rp','M'),status:'pre'},{loc:loc('rp','M'),status:'here'},{loc:loc('beach','R'),status:'late'}],
    }},
    {waves:['RP-M','BCH-M','VLG-M'],groups:{
      a1:[{loc:loc('rp','M'),status:'here'},{loc:loc('village','M'),status:'pre'},{loc:loc('village','M'),status:'here'}],
      a2:[{loc:loc('beach','M'),status:'pre'},{loc:loc('beach','M'),status:'here'},{loc:loc('village','M'),status:'here'}],
      g1:[{loc:loc('rp','M'),status:'here'},{loc:loc('village','M'),status:'pre'},{loc:loc('village','M'),status:'here'}],
      g2:[{loc:loc('beach','M'),status:'pre'},{loc:loc('beach','M'),status:'here'},{loc:loc('village','M'),status:'here'}],
    }},
  ],
  // STAGE 4
  [
    {waves:['RP-R','BCH-L','VLG-M','BCH-L'],groups:{
      a1:[{loc:loc('rp','R'),status:'here'},{loc:loc('village','M'),status:'pre'},{loc:loc('village','M'),status:'here'},{loc:loc('beach','L'),status:'late'}],
      a2:[{loc:loc('beach','L'),status:'pre'},{loc:loc('beach','L'),status:'here'},{loc:loc('beach','L'),status:'here'},{loc:loc('beach','L'),status:'here'}],
      g1:[{loc:loc('rp','R'),status:'here'},{loc:loc('village','M'),status:'pre'},{loc:loc('village','M'),status:'here'},{loc:loc('beach','L'),status:'late'}],
      g2:[{loc:loc('beach','L'),status:'pre'},{loc:loc('beach','L'),status:'here'},{loc:loc('beach','L'),status:'here'},{loc:loc('beach','L'),status:'here'}],
    }},
    {waves:['RP-M','BCH-M','RP-M','VLG-R'],groups:{
      a1:[{loc:loc('rp','M'),status:'here'},{loc:loc('rp','M'),status:'here'},{loc:loc('rp','M'),status:'here'},{loc:loc('village','R'),status:'here'}],
      a2:[{loc:loc('beach','M'),status:'pre'},{loc:loc('beach','M'),status:'here'},{loc:loc('rp','M'),status:'late'},{loc:loc('village','R'),status:'late'}],
      g1:[{loc:loc('rp','M'),status:'here'},{loc:loc('rp','M'),status:'here'},{loc:loc('rp','M'),status:'here'},{loc:loc('village','R'),status:'here'}],
      g2:[{loc:loc('beach','M'),status:'pre'},{loc:loc('beach','M'),status:'here'},{loc:loc('rp','M'),status:'late'},{loc:loc('village','R'),status:'late'}],
    }},
    {waves:['VLG-R','RP-M','VLG-M','BCH-R'],groups:{
      a1:[{loc:loc('village','R'),status:'here'},{loc:loc('rp','M'),status:'here'},{loc:loc('beach','R'),status:'pre'},{loc:loc('beach','R'),status:'here'}],
      a2:[{loc:loc('village','R'),status:'here'},{loc:loc('village','M'),status:'pre'},{loc:loc('village','M'),status:'here'},{loc:loc('beach','R'),status:'late'}],
      g1:[{loc:loc('village','R'),status:'here'},{loc:loc('rp','M'),status:'here'},{loc:loc('beach','R'),status:'pre'},{loc:loc('beach','R'),status:'here'}],
      g2:[{loc:loc('village','R'),status:'here'},{loc:loc('village','M'),status:'pre'},{loc:loc('village','M'),status:'here'},{loc:loc('beach','R'),status:'late'}],
    }},
  ],
];

let currentGroup='a1',currentStage=0,currentMode='detail';

function detailMoveCol(move,mi){
  const entries=move.groups[currentGroup];
  const color=GROUP_META[currentGroup].color;
  const cards=entries.map((e,wi)=>{
    if(e.status==='late')return null;
    const isPre=e.status==='pre';
    const badge=isPre
      ?`<span class="wave-status-badge pre">★ PRE-POS</span>`
      :`<span class="wave-status-badge" style="color:${color};border-color:${color}">ACTIVE</span>`;
    return `<div class="wave-entry"><div class="wave-card${isPre?' pre-card':''}">
      <div class="wave-card-header"><span class="wave-num-label">WAVE ${wi+1}</span>${badge}</div>
      <div class="wave-card-body"><div class="wave-loc">
        <div class="wave-loc-main" style="color:${color}">${e.loc.abbr.split('-')[0]}</div>
        <div class="wave-loc-sub">${e.loc.spawn}</div>
      </div></div>
    </div></div>`;
  }).filter(Boolean);
  const html=cards.map((c,i)=>i<cards.length-1?c+`<div class="wave-entry"><div class="wave-connector"></div></div>`:c).join('');
  return `<div class="move-col">
    <div class="move-col-header"><div class="move-col-num">${mi+1}</div><div class="move-col-sub">MOVE</div></div>
    <div class="wave-seq">${html}</div>
  </div>`;
}

function simpleMoveCol(move,mi){
  const entries=move.groups[currentGroup];
  const color=GROUP_META[currentGroup].color;
  const rows=entries.map((e,wi)=>{
    const isAbsent=e.status==='absent';
    const statusIcon=e.status==='pre'?`<span class="simple-wave-status pre">★</span>`
      :e.status==='late'?`<span class="simple-wave-status late">→</span>`:'';
    const locColor=isAbsent?'var(--muted)':color;
    const locText=isAbsent?'· · ·':e.loc.abbr;
    return `<div class="simple-wave-row${isAbsent?' absent':''}">
      <span class="simple-wave-label">W${wi+1}</span>
      <span class="simple-wave-loc" style="color:${locColor}">${locText}</span>
      ${statusIcon}
    </div>`;
  }).join('');
  return `<div class="simple-col">
    <div class="simple-col-header"><div class="simple-col-num">${mi+1}</div><div class="simple-col-sub">MOVE</div></div>
    <div class="simple-wave-list">${rows}</div>
  </div>`;
}

function ovMoveCard(move,mi){
  const rows=['a1','a2','g1','g2'].map(g=>{
    const meta=GROUP_META[g];
    const entries=move.groups[g];
    const locs=entries.filter(e=>e.status==='here'||e.status==='pre').map(e=>e.loc.abbr);
    const deduped=locs.filter((l,i)=>i===0||l!==locs[i-1]);
    return `<div class="ov-group-row">
      <span class="ov-group-tag" style="color:${meta.color}">${meta.label}</span>
      <span class="ov-group-locs">${deduped.join(' → ')}</span>
    </div>`;
  }).join('');
  return `<div class="ov-move-card">
    <div class="ov-move-title">MOVE ${mi+1}</div>
    <div class="ov-group-rows">${rows}</div>
  </div>`;
}

function stagePageHTML(si,colFn){
  return `<div class="stage-page${si===currentStage?' active':''}" data-stage="${si}">${stages[si].map((m,mi)=>colFn(m,mi)).join('')}</div>`;
}

function renderCarousels(){
  document.getElementById('detailCarousel').innerHTML=stages.map((_,si)=>stagePageHTML(si,detailMoveCol)).join('');
  document.getElementById('simpleCarousel').innerHTML=stages.map((_,si)=>stagePageHTML(si,simpleMoveCol)).join('');
  snapToStage('detailCarousel');snapToStage('simpleCarousel');
}
function renderOverview(){
  document.getElementById('overviewView').innerHTML=stages.map((sd,si)=>`
    <div class="ov-stage-block">
      <div class="ov-stage-title">STAGE ${si+1}</div>
      <div class="ov-moves-grid">${sd.map((m,mi)=>ovMoveCard(m,mi)).join('')}</div>
      ${si<stages.length-1?'<div class="ov-divider"></div>':''}
    </div>`).join('');
}
function renderStagebar(){
  document.getElementById('stageNum').textContent=currentStage+1;
  document.getElementById('stageDots').innerHTML=stages.map((_,i)=>
    `<div class="stage-dot ${i===currentStage?'active':i<currentStage?'done':''}" onclick="selectStage(${i})"></div>`).join('');
  document.getElementById('stagePrev').disabled=currentStage===0;
  document.getElementById('stageNext').disabled=currentStage===stages.length-1;
  document.getElementById('stagebar').classList.toggle('hidden-bar',currentMode==='overview');
}
function renderRoleLabel(){
  const meta=GROUP_META[currentGroup];
  const el=document.getElementById('roleLabel');
  el.textContent=meta.role;el.style.color=meta.color;
  el.style.borderColor=meta.color+'44';el.style.background=meta.color+'10';
}
function render(){
  renderStagebar();renderRoleLabel();
  document.getElementById('detailCarousel').classList.toggle('hidden',currentMode!=='detail');
  document.getElementById('simpleCarousel').classList.toggle('hidden',currentMode!=='simple');
  document.getElementById('overviewView').classList.toggle('hidden',currentMode!=='overview');
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',['detail','simple','overview'][i]===currentMode));
  if(currentMode!=='overview')renderCarousels();else renderOverview();
}
function markActivePages(){document.querySelectorAll('.stage-page').forEach(p=>p.classList.toggle('active',parseInt(p.dataset.stage)===currentStage));}
function snapToStage(id){
  const el=document.getElementById(id);if(!el)return;
  requestAnimationFrame(()=>{const page=el.querySelector(`.stage-page[data-stage="${currentStage}"]`);if(!page)return;el.scrollTo({left:page.offsetLeft,behavior:'instant'});markActivePages();});
}
function initCarouselSync(id){
  const el=document.getElementById(id);if(!el)return;
  let ticking=false;
  el.addEventListener('scroll',()=>{
    if(ticking)return;ticking=true;
    requestAnimationFrame(()=>{
      const w=el.clientWidth;if(!w){ticking=false;return;}
      const idx=Math.round(el.scrollLeft/w);
      if(idx!==currentStage&&idx>=0&&idx<stages.length){currentStage=idx;renderStagebar();markActivePages();snapToStage(id==='detailCarousel'?'simpleCarousel':'detailCarousel');}
      ticking=false;
    });
  },{passive:true});
}
function selectGroup(g){currentGroup=g;document.querySelectorAll('.group-btn').forEach(b=>b.classList.toggle('active',b.classList.contains(g)));render();}
function selectStage(i){currentStage=i;renderStagebar();snapToStage('detailCarousel');snapToStage('simpleCarousel');}
function changeStage(dir){const s=currentStage+dir;if(s<0||s>=stages.length)return;currentStage=s;renderStagebar();snapToStage('detailCarousel');snapToStage('simpleCarousel');}
function setMode(m){currentMode=m;render();}
document.addEventListener('keydown',e=>{
  if(currentMode!=='overview'){if(e.key==='ArrowLeft')changeStage(-1);if(e.key==='ArrowRight')changeStage(1);}
  if(e.key==='1')selectStage(0);if(e.key==='2')selectStage(1);if(e.key==='3')selectStage(2);if(e.key==='4')selectStage(3);
  if(e.key==='a')selectGroup('a1');if(e.key==='s')selectGroup('a2');if(e.key==='z')selectGroup('g1');if(e.key==='x')selectGroup('g2');
});
(function(){const c=document.getElementById('stars');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*1.5+0.3;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*5}s;--delay:${Math.random()*7}s;--op:${0.1+Math.random()*0.3}`;c.appendChild(s);}})();
render();
requestAnimationFrame(()=>{initCarouselSync('detailCarousel');initCarouselSync('simpleCarousel');});
</script>
</body>
</html>
